<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>REAL WAR — Not Fake</title>
<!--
═══════════════════════════════════════════════════════════════════════════
 REAL WAR (Not Fake) — single-file pseudo-3D lane shooter
═══════════════════════════════════════════════════════════════════════════
 ENGINE ARCHITECTURE (extension points for future work):

   CAM .......................... pseudo-3D projection. World space is
                                   (lx = lateral offset from road center,
                                    z  = distance ahead of the squad).
                                   Simulation runs in flat world units;
                                   perspective is render-only.
   Defs.WEAPONS / WEAPON_ORDER ... add a weapon: new entry + order slot.
   Defs.MODS .................... Contra-style pickup mods.
   Defs.ENEMIES ................. enemy archetypes (hp/speed/points/size).
   Defs.CRATES .................. destructible-barrel reward table.
   Defs.PERKS / COIN_MULTS ...... permanent meta upgrades (Armory).
   Defs.HERO_SKILLS ............. hero-mode level-up cards.
   Modes ........................ per-mode rules: {init,diff,spawnInt,
                                   tierCap,update,hudProg} hooks.
   Settings ..................... quality presets; every system reads its
                                   budget from here (particles, dpr, caps).
   Spawner ...................... enemy waves, barrels, gates, blockers.
   Engine ....................... rAF loop + state machine.
   Save ......................... localStorage persistence (versioned).
═══════════════════════════════════════════════════════════════════════════
-->
<style>
  :root{
    --ui-font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --gold:#ffc83d; --blue:#3db4ff; --red:#ff5252; --green:#5dde6a;
    --panel:#10202e; --panel2:#1a3145;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; overflow:hidden; background:#06121c; font-family:var(--ui-font);
             touch-action:none; user-select:none; -webkit-user-select:none; }
  #game{ position:fixed; inset:0; display:block; }
  /* ---------- HUD ---------- */
  #hud{ position:fixed; inset:0; pointer-events:none; display:none; color:#fff; z-index:5; }
  #hudTop{ display:flex; align-items:center; gap:8px; padding:max(8px, env(safe-area-inset-top)) 10px 0 10px; }
  .hbtn{ pointer-events:auto; background:var(--blue); border:none; border-radius:10px;
         color:#fff; font-size:18px; font-weight:800; width:44px; height:40px;
         box-shadow:0 3px 0 #1d7fc0; cursor:pointer; }
  #progWrap{ flex:1; background:rgba(0,0,0,.45); border-radius:10px; height:26px; position:relative; overflow:hidden; }
  #progFill{ position:absolute; inset:0; width:0%; background:linear-gradient(90deg,#37c0ff,#7be0ff); transition:width .3s; }
  #progText{ position:absolute; inset:0; text-align:center; line-height:26px; font-weight:800; font-size:13px; text-shadow:0 1px 2px #000; }
  #coinBox{ background:rgba(0,0,0,.45); border-radius:10px; padding:4px 10px; font-weight:800; color:var(--gold); font-size:15px; white-space:nowrap; }
  #hudRow2{ display:flex; align-items:center; gap:8px; padding:6px 10px; }
  #hpWrap{ flex:1; max-width:46%; background:rgba(0,0,0,.5); border-radius:8px; height:16px; overflow:hidden; position:relative; }
  #hpFill{ position:absolute; inset:0; width:100%; background:linear-gradient(90deg,#ff4040,#ff7a4d); }
  #hpText{ position:absolute; inset:0; font-size:10px; font-weight:800; text-align:center; line-height:16px; text-shadow:0 1px 2px #000; }
  #scoreBox{ margin-left:auto; background:rgba(0,0,0,.45); border-radius:8px; padding:3px 9px; font-size:13px; font-weight:800; color:#ffe9a0; }
  #dpsBox{ background:rgba(0,150,220,.55); border-radius:8px; padding:3px 9px; font-size:12px; font-weight:700; }
  #modChips{ display:flex; flex-wrap:wrap; gap:5px; padding:4px 10px; }
  .chip{ background:rgba(0,0,0,.55); border:1px solid rgba(255,255,255,.25); border-radius:20px;
         padding:2px 9px; font-size:10.5px; font-weight:700; letter-spacing:.4px; }
  .chip.wpn{ background:rgba(40,130,220,.7); }
  .chip.hot{ background:rgba(220,90,20,.75); }
  /* ---------- Screens ---------- */
  .screen{ position:fixed; inset:0; display:none; flex-direction:column; align-items:center;
           justify-content:flex-start; z-index:10; color:#fff; padding:20px;
           background:radial-gradient(ellipse at 50% 30%, #15364e 0%, #07131d 75%); overflow-y:auto; }
  /* center content when it fits, but keep the top reachable when it overflows */
  .screen::before{ content:''; margin-top:auto; }
  .screen::after{ content:''; margin-bottom:auto; }
  .screen.open{ display:flex; }
  .balanceBar{ position:sticky; top:4px; z-index:3; background:rgba(8,20,30,.95);
               border:1px solid #3a86b8; border-radius:24px; padding:7px 22px; }
  .screen.translucent{ background:rgba(4,12,20,.82); }
  h1.logo{ font-size:54px; font-weight:900; line-height:.95; text-align:center; letter-spacing:1px;
           color:var(--blue); text-shadow:0 4px 0 #14506e, 0 8px 18px rgba(0,0,0,.6); }
  h1.logo span{ display:block; color:#ff8b2d; text-shadow:0 4px 0 #8a3c0c, 0 8px 18px rgba(0,0,0,.6); font-size:70px; }
  .tagline{ font-weight:800; letter-spacing:3px; color:#fff; background:#0b2231; padding:3px 14px;
            border-radius:6px; margin:10px 0 24px; font-size:13px; }
  .btn{ pointer-events:auto; display:block; width:min(320px,86vw); margin:7px auto; padding:13px 16px;
        font:inherit; font-size:17px; font-weight:800; color:#fff; background:linear-gradient(#41b9ff,#1f8fe0);
        border:none; border-radius:14px; box-shadow:0 4px 0 #135f96, 0 8px 14px rgba(0,0,0,.4);
        cursor:pointer; text-align:center; }
  .btn:active{ transform:translateY(3px); box-shadow:0 1px 0 #135f96; }
  .btn.gold{ background:linear-gradient(#ffd34e,#f0a020); box-shadow:0 4px 0 #9c6410; color:#3d2800; }
  .btn.gray{ background:linear-gradient(#5a7185,#3c4f60); box-shadow:0 4px 0 #243441; }
  .btn.red{ background:linear-gradient(#ff6a5a,#d8372a); box-shadow:0 4px 0 #8c1d14; }
  .btn small{ display:block; font-size:11px; font-weight:600; opacity:.85; }
  .panel{ background:var(--panel); border:1px solid #2a4a63; border-radius:16px;
          padding:14px; width:min(420px,94vw); margin:8px 0; }
  .panel h3{ font-size:14px; letter-spacing:1px; color:#8fd4ff; margin-bottom:8px; text-transform:uppercase; }
  .rowflex{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin:7px 0; flex-wrap:wrap; }
  .rowflex label{ font-size:13.5px; font-weight:600; }
  select,input[type=range]{ pointer-events:auto; font:inherit; background:var(--panel2); color:#fff;
        border:1px solid #35597a; border-radius:8px; padding:5px 8px; }
  input[type=checkbox]{ pointer-events:auto; width:20px; height:20px; accent-color:var(--blue); }
  .perk{ background:var(--panel2); border-radius:12px; padding:10px; margin:7px 0; }
  .perk .nm{ font-weight:800; font-size:14px; }
  .perk .ds{ font-size:11.5px; opacity:.8; margin:2px 0 6px; }
  .pips{ display:inline-flex; gap:3px; margin-right:8px; }
  .pip{ width:12px; height:12px; border-radius:3px; background:#27435a; }
  .pip.on{ background:var(--gold); }
  .buy{ pointer-events:auto; background:linear-gradient(#ffd34e,#eda31d); border:none; border-radius:8px;
        padding:6px 12px; font-weight:800; font-size:12.5px; color:#3d2800; cursor:pointer; box-shadow:0 2px 0 #9c6410; }
  .buy:disabled{ filter:grayscale(.9); opacity:.55; cursor:default; }
  .statgrid{ display:grid; grid-template-columns:1fr 1fr; gap:6px 18px; font-size:14px; margin:14px 0;
             background:rgba(0,0,0,.3); border-radius:12px; padding:14px 18px; }
  .statgrid b{ color:var(--gold); }
  .cards{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .card{ pointer-events:auto; width:108px; min-height:140px;
         background:linear-gradient(#16344a,#0e2233); border:2px solid #3d6f99; border-radius:14px;
         padding:10px 8px; text-align:center; cursor:pointer; transition:transform .12s; }
  .card:hover{ transform:scale(1.06); border-color:var(--gold); }
  .card .ico{ font-size:30px; }
  .card .nm{ font-weight:800; font-size:12.5px; margin:6px 0 4px; color:#9fdcff; }
  .card .ds{ font-size:10.5px; opacity:.85; line-height:1.3; }
  .modeBest{ font-size:11px; opacity:.8; font-weight:600; }
  #toast{ position:fixed; left:50%; top:18%; transform:translateX(-50%); background:rgba(8,20,30,.92);
          border:1px solid #3a86b8; color:#fff; font-weight:800; padding:10px 22px; border-radius:30px;
          z-index:50; display:none; font-size:15px; text-align:center; }
  .coinsBig{ font-size:18px; font-weight:900; color:var(--gold); margin:6px 0 14px; }
  ::-webkit-scrollbar{ width:6px } ::-webkit-scrollbar-thumb{ background:#2a4a63; border-radius:3px }
</style>
</head>
<body>
<canvas id="game"></canvas>

<!-- ════════ HUD ════════ -->
<div id="hud">
  <div id="hudTop">
    <button class="hbtn" id="btnPause">&#10074;&#10074;</button>
    <div id="progWrap"><div id="progFill"></div><div id="progText">0%</div></div>
    <div id="coinBox">🪙 <span id="coinVal">0</span></div>
  </div>
  <div id="hudRow2">
    <div id="hpWrap"><div id="hpFill"></div><div id="hpText"></div></div>
    <div id="dpsBox">⚔ <span id="dpsVal">0</span>/s</div>
    <div id="scoreBox">★ <span id="scoreVal">0</span></div>
  </div>
  <div id="modChips"></div>
</div>

<!-- ════════ MAIN MENU ════════ -->
<div class="screen open" id="scrMenu">
  <h1 class="logo">REAL<span>WAR</span></h1>
  <div class="tagline">NOT FAKE</div>
  <div class="coinsBig">🪙 <span id="menuCoins">0</span></div>
  <button class="btn" data-mode="stage">⚔️ Stage Mode <small class="modeBest" id="bestStage"></small></button>
  <button class="btn" data-mode="endless">♾️ Endless Mode <small class="modeBest" id="bestEndless"></small></button>
  <button class="btn" data-mode="army">🪖 Army Builder <small class="modeBest" id="bestArmy"></small></button>
  <button class="btn" data-mode="hero">🦸 Hero Mode <small class="modeBest" id="bestHero"></small></button>
  <button class="btn gold" id="btnArmory">🛡️ Armory — Upgrades</button>
  <button class="btn gray" id="btnSettings">⚙️ Settings</button>
</div>

<!-- ════════ ARMORY ════════ -->
<div class="screen" id="scrArmory">
  <h1 class="logo" style="font-size:34px">ARMORY</h1>
  <div class="coinsBig balanceBar">Balance: 🪙 <span id="armoryCoins">0</span></div>
  <div class="panel"><h3>Permanent Upgrades <span style="opacity:.6;font-size:10px">(toggle on/off)</span></h3><div id="perkList"></div></div>
  <div class="panel"><h3>Coin Multipliers</h3><div id="multList"></div></div>
  <button class="btn gray" data-back>← Back</button>
</div>

<!-- ════════ SETTINGS ════════ -->
<div class="screen translucent" id="scrSettings">
  <h1 class="logo" style="font-size:34px">SETTINGS</h1>
  <div class="panel">
    <h3>Performance</h3>
    <div class="rowflex"><label>Quality preset</label>
      <select id="setQuality"><option value="low">Low</option><option value="medium">Medium</option><option value="high" selected>High</option><option value="ultra">Ultra</option></select></div>
    <div class="rowflex"><label>Resolution scale <span id="resVal"></span></label><input type="range" id="setRes" min="50" max="100" step="5"></div>
    <div class="rowflex"><label>Particles <span id="partVal"></span></label><input type="range" id="setPart" min="0" max="100" step="10"></div>
    <div class="rowflex"><label>FPS cap</label>
      <select id="setFps"><option value="0">Uncapped</option><option value="60">60</option><option value="30">30</option></select></div>
    <div class="rowflex"><label>Screen shake</label><input type="checkbox" id="setShake"></div>
    <div class="rowflex"><label>Damage numbers</label><input type="checkbox" id="setDmgTxt"></div>
    <div class="rowflex"><label>Glow / fancy effects</label><input type="checkbox" id="setGlow"></div>
    <div class="rowflex"><label>Tiny Swords sprites</label><input type="checkbox" id="setSprites"></div>
  </div>
  <div class="panel">
    <h3>Audio</h3>
    <div class="rowflex"><label>Sound</label><input type="checkbox" id="setSound"></div>
    <div class="rowflex"><label>Volume <span id="volVal"></span></label><input type="range" id="setVol" min="0" max="100" step="10"></div>
  </div>
  <button class="btn gray" data-back>← Back</button>
</div>

<!-- ════════ PAUSE ════════ -->
<div class="screen translucent" id="scrPause">
  <h1 class="logo" style="font-size:38px">PAUSED</h1>
  <button class="btn" id="btnResume">▶ Resume</button>
  <button class="btn gray" id="btnPauseSettings">⚙️ Settings</button>
  <button class="btn red" id="btnQuit">🏳️ Quit to Menu</button>
</div>

<!-- ════════ GAME OVER / STAGE CLEAR ════════ -->
<div class="screen" id="scrOver">
  <h1 class="logo" style="font-size:40px" id="overTitle">DEFEATED</h1>
  <div class="statgrid" id="overStats"></div>
  <button class="btn gold" id="btnNext" style="display:none">➡ Next Stage</button>
  <button class="btn" id="btnRetry">↻ Play Again</button>
  <button class="btn gray" id="btnOverMenu">🏠 Menu</button>
</div>

<!-- ════════ HERO LEVEL-UP ════════ -->
<div class="screen translucent" id="scrLevel">
  <h1 class="logo" style="font-size:30px">LEVEL UP!</h1>
  <p style="margin:4px 0 16px;font-weight:700;color:#9fdcff" id="lvlSub"></p>
  <div class="cards" id="lvlCards"></div>
</div>

<div id="toast"></div>

<script>
'use strict';
/* ═══════════════════════════ UTILITIES ═══════════════════════════ */
const $=id=>document.getElementById(id);
const clamp=(v,a,b)=>v<a?a:(v>b?b:v);
const lerp=(a,b,t)=>a+(b-a)*t;
const rand=(a,b)=>a+Math.random()*(b-a);
const irand=(a,b)=>Math.floor(rand(a,b+1));
const dist2=(ax,ay,bx,by)=>{const dx=ax-bx,dy=ay-by;return dx*dx+dy*dy;};
const fmt=n=>n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e4?(n/1e3).toFixed(1)+'K':Math.floor(n)+'';
function weightedPick(table){
  let total=0; for(const t of table) total+=t.w;
  let r=Math.random()*total;
  for(const t of table){ r-=t.w; if(r<=0) return t; }
  return table[table.length-1];
}
function toast(msg,ms=1400){
  const t=$('toast'); t.innerHTML=msg; t.style.display='block';
  clearTimeout(t._tm); t._tm=setTimeout(()=>t.style.display='none',ms);
}

/* ═══════════════════════════ SAVE ═══════════════════════════ */
const Save={
  KEY:'realwar_save_v1',
  data:{ coins:0, perks:{}, perkOn:{}, mults:{}, multOn:{}, stageReached:1,
         best:{stage:0,endless:0,army:0,hero:0}, settings:null, seenHint:false },
  load(){
    try{ const raw=localStorage.getItem(this.KEY);
         if(raw) Object.assign(this.data, JSON.parse(raw)); }catch(e){}
  },
  save(){ try{ localStorage.setItem(this.KEY, JSON.stringify(this.data)); }catch(e){} }
};
Save.load();

/* ═══════════════════════════ SETTINGS ═══════════════════════════ */
const Settings={
  data:{ quality:'high', res:100, particles:80, fps:0, shake:true, dmgText:true,
         glow:true, sprites:true, sound:true, volume:60 },
  presets:{
    low:   { res:60,  particles:20,  fps:30, shake:false, dmgText:false, glow:false },
    medium:{ res:80,  particles:50,  fps:60, shake:true,  dmgText:true,  glow:false },
    high:  { res:100, particles:80,  fps:0,  shake:true,  dmgText:true,  glow:true  },
    ultra: { res:100, particles:100, fps:0,  shake:true,  dmgText:true,  glow:true  }
  },
  budget(){ const q=this.data.quality;
    return { low:   {maxParticles:60,  maxEnemies:55,  maxBullets:90,  shadows:false},
             medium:{maxParticles:150, maxEnemies:80,  maxBullets:160, shadows:true},
             high:  {maxParticles:300, maxEnemies:110, maxBullets:240, shadows:true},
             ultra: {maxParticles:500, maxEnemies:150, maxBullets:320, shadows:true} }[q];
  },
  applyPreset(name){
    this.data.quality=name;
    Object.assign(this.data, this.presets[name]);
    this.syncUI(); this.persist(); Renderer.resize();
  },
  persist(){ Save.data.settings={...this.data}; Save.save(); },
  init(){
    if(Save.data.settings) Object.assign(this.data, Save.data.settings);
    this.syncUI();
    $('setQuality').onchange=e=>this.applyPreset(e.target.value);
    $('setRes').oninput=e=>{this.data.res=+e.target.value; this.syncUI(); this.persist(); Renderer.resize();};
    $('setPart').oninput=e=>{this.data.particles=+e.target.value; this.syncUI(); this.persist();};
    $('setFps').onchange=e=>{this.data.fps=+e.target.value; this.persist();};
    $('setShake').onchange=e=>{this.data.shake=e.target.checked; this.persist();};
    $('setDmgTxt').onchange=e=>{this.data.dmgText=e.target.checked; this.persist();};
    $('setGlow').onchange=e=>{this.data.glow=e.target.checked; this.persist();};
    $('setSprites').onchange=e=>{this.data.sprites=e.target.checked; this.persist();};
    $('setSound').onchange=e=>{this.data.sound=e.target.checked; this.persist();};
    $('setVol').oninput=e=>{this.data.volume=+e.target.value; this.syncUI(); this.persist();};
  },
  syncUI(){
    const d=this.data;
    $('setQuality').value=d.quality; $('setRes').value=d.res; $('setPart').value=d.particles;
    $('setFps').value=d.fps; $('setShake').checked=d.shake; $('setDmgTxt').checked=d.dmgText;
    $('setGlow').checked=d.glow; $('setSprites').checked=d.sprites!==false;
    $('setSound').checked=d.sound; $('setVol').value=d.volume;
    $('resVal').textContent=d.res+'%'; $('partVal').textContent=d.particles+'%';
    $('volVal').textContent=d.volume+'%';
  }
};

/* ═══════════════════════════ AUDIO (tiny synth) ═══════════════════════════ */
const Audio2={
  ctx:null, master:null, last:{},
  ensure(){
    if(this.ctx) return;
    try{
      this.ctx=new (window.AudioContext||window.webkitAudioContext)();
      this.master=this.ctx.createGain(); this.master.connect(this.ctx.destination);
    }catch(e){}
  },
  play(name){
    if(!Settings.data.sound||!this.ctx) return;
    const now=performance.now();
    if(this.last[name] && now-this.last[name]<45) return;
    this.last[name]=now;
    const c=this.ctx, t=c.currentTime, g=c.createGain();
    this.master.gain.value=Settings.data.volume/100*0.5;
    g.connect(this.master);
    const o=c.createOscillator(); o.connect(g);
    const defs={
      shot:   {f:340,f2:120,type:'square',  v:.08,d:.07},
      shotgun:{f:160,f2:50, type:'sawtooth',v:.18,d:.18},
      sniper: {f:520,f2:80, type:'sawtooth',v:.15,d:.2},
      tesla:  {f:900,f2:120,type:'sawtooth',v:.12,d:.22},
      flame:  {f:90, f2:60, type:'sawtooth',v:.05,d:.1},
      hit:    {f:200,f2:90, type:'triangle',v:.07,d:.06},
      boom:   {f:110,f2:30, type:'sawtooth',v:.25,d:.4},
      coin:   {f:880,f2:1320,type:'sine',   v:.1, d:.12},
      pickup: {f:520,f2:1040,type:'square', v:.1, d:.16},
      hurt:   {f:170,f2:60, type:'square',  v:.16,d:.22},
      crash:  {f:80, f2:25, type:'sawtooth',v:.3, d:.5},
      level:  {f:440,f2:880,type:'sine',    v:.14,d:.35}
    };
    const s=defs[name]||defs.shot;
    o.type=s.type; o.frequency.setValueAtTime(s.f,t);
    o.frequency.exponentialRampToValueAtTime(Math.max(20,s.f2),t+s.d);
    g.gain.setValueAtTime(s.v,t); g.gain.exponentialRampToValueAtTime(.0001,t+s.d);
    o.start(t); o.stop(t+s.d+.02);
  }
};

/* ═══════════════════════════ DEFINITIONS ═══════════════════════════ */
const Defs={};

Defs.WEAPONS={
  pistol:  {name:'Pistol',      ico:'🔫', dmg:12,  rate:2.4, speed:560, proj:1, spread:0,    pierce:0, range:0,   snd:'shot'},
  smg:     {name:'SMG',         ico:'🔫', dmg:7,   rate:9,   speed:600, proj:1, spread:.07,  pierce:0, range:0,   snd:'shot'},
  rifle:   {name:'Assault Rifle',ico:'🎯',dmg:16,  rate:6,   speed:680, proj:1, spread:.035, pierce:0, range:0,   snd:'shot'},
  shotgun: {name:'Shotgun',     ico:'💥', dmg:11,  rate:1.3, speed:520, proj:6, spread:.38,  pierce:0, range:340, snd:'shotgun', falloff:true},
  sniper:  {name:'Sniper Rifle',ico:'🎯', dmg:70,  rate:.95, speed:980, proj:1, spread:0,    pierce:4, range:0,   snd:'sniper'},

const Perks={
  level(id){ return Save.data.perks[id]||0; },
  active(id){ return (Save.data.perkOn[id]!==false) ? this.level(id) : 0; },
  coinMult(){
    let m=1+ .15*this.active('fortune');
    let best=1;
    for(const cm of Defs.COIN_MULTS)
      if(Save.data.mults[cm.id] && Save.data.multOn[cm.id]!==false) best=Math.max(best,cm.mult);
    return m*best;
  }
};

/* ═══════════════════════════ RENDERER / CANVAS ═══════════════════════════ */
const Renderer={
  cv:null, g:null, LW:480, LH:854, scale:1, shakeT:0, shakeMag:0,
  init(){ this.cv=$('game'); this.g=this.cv.getContext('2d'); this.resize();
          addEventListener('resize',()=>this.resize());
          document.addEventListener('visibilitychange',()=>this.resize()); },
  resize(){
    const dpr=Math.min(devicePixelRatio||1,2)*(Settings.data.res/100);
    // guard against hidden tabs / collapsed iframes reporting ~0 size
    const w=Math.max(innerWidth,320),h=Math.max(innerHeight,480);
    this.cv.width=Math.round(w*dpr); this.cv.height=Math.round(h*dpr);
    this.cv.style.width=w+'px'; this.cv.style.height=h+'px';
    this.scale=this.cv.width/this.LW;
    this.LH=this.cv.height/this.scale;
  },
  shake(mag){ if(!Settings.data.shake) return;
    this.shakeMag=Math.max(this.shakeMag,mag); this.shakeT=.25; },
  frame(t,dt){
    const g=this.g;
    g.setTransform(this.scale,0,0,this.scale,0,0);
    if(this.shakeT>0){ this.shakeT-=dt;
      g.translate(rand(-1,1)*this.shakeMag*this.shakeT*4, rand(-1,1)*this.shakeMag*this.shakeT*4);
      if(this.shakeT<=0) this.shakeMag=0; }
    return g;
  }
};

/* ═══════════════════════ PSEUDO-3D CAMERA ═══════════════════════
   World space: lx = lateral offset from road center (±ROAD.half at the
   player plane), z = distance ahead of the squad (0 = player line).
   Projection: scale s = near/(near+z). Road edges become straight lines
   converging on the vanishing point (240, horizonY).                  */
const ROAD={ half:178 };
const CAM={
  near:430, zMax:780,
  horizonY(){ return Renderer.LH*0.17; },
  playerY(){ return Renderer.LH-165; },
  project(lx,z){
    const s=this.near/(this.near+Math.max(z,-this.near*.5));
    return { x:240+lx*s,
             y:this.playerY()-(this.playerY()-this.horizonY())*(1-s),
             s };
  },
  fade(z){ return clamp((this.zMax-z)/130,0,1); } // entities fade in over the horizon
};

const Sprites={
  CELL:96, img:null, ready:false,
  map:{ soldier:{row:0,n:6,fps:10}, rock1:{row:0,col:6}, rock2:{row:0,col:7},
        hero:{row:1,n:6,fps:12}, arrow:{row:1,col:6},
        grunt:{row:2,n:6,fps:10}, runner:{row:3,n:6,fps:13},
        brute:{row:4,n:6,fps:8}, husk:{row:5,n:6,fps:10},
        boom:{row:6,n:6,fps:14}, boss:{row:7,n:6,fps:7} },
  init(){
    if(SPRITE_B64.indexOf('data:image')!==0) return; // atlas not injected — vector fallback
    this.img=new Image();
    this.img.onload=()=>{ this.ready=true; };
    this.img.src=SPRITE_B64;
  },
  on(){ return this.ready && Settings.data.sprites!==false; },
  // animated unit, anchored at the feet line; h = target character height
  unit(g,name,x,y,h,t,flip,alpha){
    const m=this.map[name];
    const f=m.n?Math.floor(t*m.fps)%m.n:0;
    const size=h*1.9;
    g.save();
    if(alpha!==undefined&&alpha<1) g.globalAlpha=Math.max(alpha,0);
    g.translate(x,y);
    if(flip) g.scale(-1,1);
    g.drawImage(this.img,((m.col||0)+f)*this.CELL,m.row*this.CELL,this.CELL,this.CELL,
                -size/2,-size*.86,size,size);
    g.restore();
  },
  cell(g,name,x,y,w,h){ // static cell (rocks, arrow), centered on x / bottom-ish on y
    const m=this.map[name];
    g.drawImage(this.img,(m.col||0)*this.CELL,m.row*this.CELL,this.CELL,this.CELL,
                x-w/2,y-h*.78,w,h);
  }
};

/* ═══════════════════════════ INPUT ═══════════════════════════ */
const Input={
  down:false, x:240, keys:{},
  init(){
    const cv=Renderer.cv;
    const toLX=e=>((e.clientX)*(Renderer.cv.width/Math.max(innerWidth,1)))/Renderer.scale;
    cv.addEventListener('pointerdown',e=>{ Audio2.ensure(); this.down=true; this.x=toLX(e); });
    cv.addEventListener('pointermove',e=>{ if(this.down) this.x=toLX(e); });
    addEventListener('pointerup',()=>this.down=false);
    addEventListener('pointercancel',()=>this.down=false);
    addEventListener('keydown',e=>{ this.keys[e.key]=true;
      if(e.key==='Escape'||e.key==='p') Engine.togglePause(); });
    addEventListener('keyup',e=>this.keys[e.key]=false);
  }
};

let P=null;
let enemies=[], bullets=[], crates=[], gates=[], blockers=[], particles=[], floaters=[], beams=[];

function newPlayer(mode){
  const arsenal=Perks.active('arsenal');
  const startIdx=clamp(arsenal,0,3);
  return {
    mode, lx:0, speed:430,
    maxHp:100+25*Perks.active('vest'), hp:0,
    troops: mode==='army' ? 5+2*Perks.active('recruit') : (mode==='hero'?1:4),
    weaponIdx:startIdx, weapon:Defs.WEAPON_ORDER[startIdx],
    mods:{power:0,rapid:0,spread:0,fire:0,poison:0,expl:0,unique:0},
    fireAcc:0, shotCounter:0, spinup:0, shield:0,
    score:0, coins:0, kills:0, time:0, scoreMult:1, scoreMultT:0,
    dmgDealt:0, dpsWindow:0, dpsTimer:0, dps:0,
    hero:{lvl:1, xp:0, xpNeed:9, dmgMult:1, rateMult:1, multishot:0, pierce:0,
          crit:0, regen:0, coinMult:1}
  };
}

const Modes={
  current:null, stage:1, bossSpawned:false, progress:0, killGoal:0,
  defs:{
    stage:{
      label:s=>'Stage '+Modes.stage,
      init(){ Modes.stage=Game.pendingStage||Save.data.stageReached;
              Modes.killGoal=30+Modes.stage*16; Modes.bossSpawned=false;
              P.hp=P.maxHp; },
      diff(){ return 1.05+(Modes.stage-1)*.42+Math.min(.5,P.time*.004); },
      spawnInt(){ return Math.max(.22, .98-Modes.stage*.06); },
      tierCap(){ return clamp(Modes.stage, 1, Defs.WEAPON_ORDER.length); },
      update(dt){
        Modes.progress=clamp(P.kills/Modes.killGoal,0,1);
        if(Modes.progress>=1 && !Modes.bossSpawned){
          Modes.bossSpawned=true; Spawner.spawnBoss(); toast('⚠️ BOSS INCOMING ⚠️'); }
      },
      hudProg(){ return Modes.bossSpawned?'BOSS FIGHT!':Math.floor(Modes.progress*100)+'%'; }
    },
    endless:{
      label:()=>'★ '+fmt(Math.floor(P?P.score:0)),
      init(){ P.hp=P.maxHp; },
      diff(){ return 1+P.time*.03; },
      spawnInt(){ return Math.max(.2, .85-P.time*.014); },
      tierCap(){ return clamp(1+Math.floor(P.time/40), 1, Defs.WEAPON_ORDER.length); },
      update(dt){ Modes.progress=(P.time%60)/60; },
      hudProg(){ return Math.floor(P.time)+'s · '+P.kills+' kills'; }
    },
    army:{
      label:()=>'Army Builder',
      init(){ P.hp=1; },
      diff(){ return 1+P.time*.026+P.troops*.025; },
      spawnInt(){ return Math.max(.22, .82-P.time*.012); },
      tierCap(){ return clamp(1+Math.floor(P.time/38), 1, Defs.WEAPON_ORDER.length); },
      update(dt){ Modes.progress=(P.time%60)/60;
        if(Math.random()<dt*.14 && gates.length<2) Spawner.spawnGatePair(); },
      hudProg(){ return '🪖 '+P.troops+' · ★ '+fmt(Math.floor(P.score)); }
    },
    hero:{
      label:()=>'Hero Lv.'+P.hero.lvl,
      init(){ P.maxHp=80+25*Perks.active('vest'); P.hp=P.maxHp; P.troops=1; },
      diff(){ return 1+P.time*.026+(P.hero.lvl-1)*.08; },
      spawnInt(){ return Math.max(.22, 1.0-P.time*.012); },
      tierCap(){ return clamp(1+Math.floor((P.hero.lvl-1)/2), 1, Defs.WEAPON_ORDER.length); },
      update(dt){ Modes.progress=P.hero.xp/P.hero.xpNeed;
        if(P.hero.regen>0) P.hp=Math.min(P.maxHp,P.hp+P.hero.regen*dt); },
      hudProg(){ return 'Lv.'+P.hero.lvl+' · ★ '+fmt(Math.floor(P.score)); }
    }
  },
  get def(){ return this.defs[this.current]; }
};

/* ═══════════════════════════ SPAWNER ═══════════════════════════ */
const Spawner={
  t:0, crateT:0, blockT:0,
  reset(){ this.t=1.0; this.crateT=2.0; this.blockT=rand(5,8); },
  update(dt){
    const b=Settings.budget();
    this.t-=dt;
    if(this.t<=0 && enemies.length<b.maxEnemies){
      this.t=Modes.def.spawnInt()*rand(.7,1.3);
      this.spawnWave();
    }
    this.crateT-=dt;
    if(this.crateT<=0 && crates.length<6){
      this.crateT=rand(2.4,4.2);
      this.spawnCrate();
    }
    this.blockT-=dt;
    if(this.blockT<=0 && blockers.length<3){
      this.blockT=rand(6,11)/Math.sqrt(Modes.def.diff());
      this.spawnBlocker();
    }
  },
  spawnWave(){
    const d=Modes.def.diff();
    const table=[{w:50,k:'grunt'},{w:20,k:'runner'},{w:d>1.4?15:5,k:'brute'},{w:d>1.15?18:7,k:'husk'}];
    const kind=weightedPick(table).k;
    const n=kind==='grunt'?irand(2,2+Math.min(5,Math.floor(d*1.5))):(kind==='runner'?irand(1,2):1);
    const blx=rand(-ROAD.half+30,ROAD.half-30);
    for(let i=0;i<n;i++)
      this.spawnEnemy(kind, clamp(blx+rand(-30,30),-ROAD.half+16,ROAD.half-16), CAM.zMax-15-i*30, d);
  },
  spawnEnemy(kind,lx,z,d){
    const t=Defs.ENEMIES[kind];
    enemies.push({kind, lx, z, r:t.r, hp:t.hp*d, maxHp:t.hp*d,
      spd:t.spd*(1+(d-1)*.18)*rand(.9,1.1), wob:rand(0,6.28),
      burn:0,burnT:0, pois:0,poisT:0, flash:0, boss:!!t.boss});
  },
  spawnBoss(){
    const d=Modes.def.diff();
    const t=Defs.ENEMIES.boss;
    enemies.push({kind:'boss', lx:0, z:CAM.zMax-30, r:t.r, hp:t.hp*d, maxHp:t.hp*d,
      spd:t.spd, wob:0, burn:0,burnT:0,pois:0,poisT:0, flash:0, boss:true});
  },
  spawnCrate(){
    const d=Modes.def.diff();
    const luck=Perks.active('luck');
    const table=Defs.CRATES.map(c=>({...c, w:c.kind==='coins'?Math.max(4,c.w-luck*5):c.w+(c.kind==='weapon'||c.kind==='unique'?luck*2:0)}));
    const choice=weightedPick(table);
    const c={ lx:rand(-ROAD.half+40,ROAD.half-40), z:CAM.zMax-25, r:26,
      hp:Math.round(44*d*rand(.8,1.3)), maxHp:1, spd:38+d*4,
      kind:choice.kind, ico:choice.ico };
    c.maxHp=c.hp;
    crates.push(c);
  },
  spawnBlocker(){
    const d=Modes.def.diff();
    const b={ lx:rand(-ROAD.half+62,ROAD.half-62), z:CAM.zMax-20, w:84,
      hp:Math.round(130*d), maxHp:1, spd:64 };
    b.maxHp=b.hp;
    blockers.push(b);
  },
  spawnGatePair(){
    const d=Modes.def.diff();
    const plus=irand(2,4+Math.floor(d));
    const minus=-irand(4,7+Math.floor(d*1.7));
    const leftPlus=Math.random()<.5;
    gates.push({l0:-ROAD.half, l1:0, z:CAM.zMax-20, val:leftPlus?plus:minus, acc:0, spd:50});
    gates.push({l0:0, l1:ROAD.half, z:CAM.zMax-20, val:leftPlus?minus:plus, acc:0, spd:50});
  }
};

/* ═══════════════════════════ FX (screen-space) ═══════════════════════════ */
const FX={
  budgetScale(){ return Settings.data.particles/100; },
  burst(x,y,color,n,spd=120,life=.5,size=3){
    const cap=Settings.budget().maxParticles;
    n=Math.round(n*this.budgetScale());
    for(let i=0;i<n;i++){
      if(particles.length>=cap) particles.shift();
      const a=rand(0,6.283), s=rand(.3,1)*spd;
      particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(.5,1)*life,
                      t:0,color,size:rand(.6,1.3)*size});
    }
  },
  burstW(lx,z,color,n,spd,life,size){ // world-space helper
    const p=CAM.project(lx,z);
    this.burst(p.x,p.y,color,n,(spd||120)*p.s,life,(size||3)*Math.max(p.s,.4));
  },
  text(x,y,str,color='#fff',size=15){
    if(!Settings.data.dmgText && color==='#fff') return;
    if(floaters.length>40) floaters.shift();
    floaters.push({x:x+rand(-8,8),y,str,color,size,t:0,life:.8});
  },
  textW(lx,z,str,color,size){
    const p=CAM.project(lx,z);
    this.text(p.x,p.y,str,color,Math.max(10,(size||15)*p.s));
  },
  beamW(worldPts,color){ // project a polyline of world points
    if(beams.length>14) beams.shift();
    const pts=worldPts.map(w=>{ const p=CAM.project(w.lx,w.z); return {x:p.x,y:p.y}; });
    beams.push({pts,color,t:0,life:.16});
  },
  update(dt){
    for(let i=particles.length-1;i>=0;i--){ const p=particles[i];
      p.t+=dt; if(p.t>=p.life){ particles.splice(i,1); continue; }
      p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=180*dt; }
    for(let i=floaters.length-1;i>=0;i--){ const f=floaters[i];
      f.t+=dt; f.y-=42*dt; if(f.t>=f.life) floaters.splice(i,1); }
    for(let i=beams.length-1;i>=0;i--){ const b=beams[i];
      b.t+=dt; if(b.t>=b.life) beams.splice(i,1); }
  }
};

/* ═══════════════════════════ COMBAT ═══════════════════════════ */
const Combat={
  effDamage(base){
    let m=(1+.25*P.mods.power)*(1+.1*Perks.active('rounds'));
    if(P.mode==='hero') m*=P.hero.dmgMult*1.6; // lone hero hits like an elite
    return base*m;
  },
  effRate(w){
    let r=w.rate*Defs.RAPID_MULTS[P.mods.rapid]*(1+.06*Perks.active('trigger'));
    if(P.mode==='hero') r*=P.hero.rateMult*1.3;
    if(P.weapon==='smg' && P.mods.unique) r*=1.6;
    if(P.weapon==='minigun' && P.mods.unique) r*=(1+.7*Math.min(1,P.spinup));
    return r;
  },
  shooterCount(){ return P.mode==='hero'?1:P.troops; },
  updateFiring(dt){
    const w=Defs.WEAPONS[P.weapon];
    P.spinup=clamp(P.spinup+dt*.8,0,1);
    P.fireAcc+=dt*this.effRate(w);
    let n=0;
    while(P.fireAcc>=1 && n<4){ P.fireAcc-=1; this.fireVolley(w); n++; }
    if(P.fireAcc>2) P.fireAcc=2;
  },
  fireVolley(w){
    Audio2.play(w.snd);
    if(w.chain){ this.fireTesla(w); return; }
    const cap=Settings.budget().maxBullets;
    const shooters=this.shooterCount();
    const guns=Math.min(shooters,12);
    const dmgScale=shooters/guns;
    let proj=w.proj+P.mods.spread + (P.mode==='hero'?P.hero.multishot:0);
    if(P.weapon==='pistol'&&P.mods.unique) proj+=1;
    const spreadArc=w.spread*(1+P.mods.spread*.45)+(proj>1&&!w.spread?.12:0);
    P.shotCounter++;
    const uniqueSniper=(P.weapon==='sniper'&&P.mods.unique);
    for(let s=0;s<guns;s++){
      const off=Squad.offset(s,guns);
      for(let i=0;i<proj;i++){
        if(bullets.length>=cap) bullets.shift();
        const t=proj===1?0:(i/(proj-1)-.5);
        const a=t*spreadArc*2 + rand(-1,1)*w.spread*.4; // 0 = straight down-range
        const grenade=(P.weapon==='rifle'&&P.mods.unique&&P.shotCounter%4===0);
        bullets.push({ lx:P.lx+off.x, z:12,
          lvx:Math.sin(a)*w.speed, zv:Math.cos(a)*w.speed,
          dmg:this.effDamage(w.dmg)*dmgScale*(uniqueSniper?1.5:1),
          pierce:(w.pierce|0)+(P.mode==='hero'?P.hero.pierce:0)+(uniqueSniper?999:0),
          range:w.range||0, traveled:0, flame:!!w.flame, falloff:!!w.falloff,
          grenade, kind:P.weapon });
      }
    }
    const mp=CAM.project(P.lx,18);
    FX.burst(mp.x,mp.y-26,w.flame?'#ff9b2d':'#ffe9a0',w.flame?2:3,60,.13,2.5);
  },
  // Tesla arcs chain through enemies AND destructibles (barrels, blockers)
  teslaTargets(){
    const out=[];
    for(const e of enemies) out.push({lx:e.lx,z:e.z,t:'e',o:e});
    for(const c of crates) out.push({lx:c.lx,z:c.z,t:'c',o:c});
    for(const b of blockers) out.push({lx:b.lx,z:b.z,t:'b',o:b});
    return out;
  },
  fireTesla(w){
    const maxChain=w.chain+(P.mods.unique?3:0)+P.mods.spread;
    const fall=P.mods.unique?.9:w.chainFall;
    let dmg=this.effDamage(w.dmg)*Math.sqrt(this.shooterCount());
    let sx=P.lx, sz=14;
    const targets=this.teslaTargets();
    const hitSet=new Set(), pts=[{lx:sx,z:sz}];
    for(let j=0;j<maxChain;j++){
      let best=null,bd=j===0?w.range*w.range:150*150;
      for(const tg of targets){
        if(hitSet.has(tg.o)) continue;
        const d=dist2(sx,sz,tg.lx,tg.z);
        if(d<bd){bd=d;best=tg;}
      }
      if(!best) break;
      hitSet.add(best.o); pts.push({lx:best.lx,z:best.z});
      if(best.t==='e') this.damageEnemy(best.o,dmg,{zap:true});
      else if(best.t==='c') this.damageCrate(best.o,dmg);
      else this.damageBlocker(best.o,dmg);
      dmg*=fall; sx=best.lx; sz=best.z;
    }
    if(pts.length>1){
      const jag=[];
      for(let i=0;i<pts.length-1;i++){
        const a=pts[i],b=pts[i+1];
        jag.push(a);
        for(let s=1;s<3;s++)
          jag.push({lx:lerp(a.lx,b.lx,s/3)+rand(-10,10), z:lerp(a.z,b.z,s/3)+rand(-10,10)});
      }
      jag.push(pts[pts.length-1]);
      FX.beamW(jag,'#9fe6ff');
    }
  },
  applyHitMods(e){
    if(P.mods.fire||(P.weapon==='shotgun'&&P.mods.unique)){
      e.burn=Math.max(e.burn,this.effDamage(4)); e.burnT=3; }
    if(P.mods.poison){ e.pois=Math.max(e.pois,this.effDamage(5)); e.poisT=4; }
  },
  explode(lx,z,dmg,r=62){
    Audio2.play('boom'); Renderer.shake(3);
    FX.burstW(lx,z,'#ffb347',16,200,.5,4); FX.burstW(lx,z,'#ff5e2d',10,140,.4,5);
    for(const e of enemies)
      if(dist2(lx,z,e.lx,e.z)<(r+e.r)*(r+e.r)) this.damageEnemy(e,dmg,{noExpl:true});
    for(const c of crates)
      if(dist2(lx,z,c.lx,c.z)<(r+c.r)*(r+c.r)) this.damageCrate(c,dmg);
    for(const b of blockers)
      if(dist2(lx,z,b.lx,b.z)<(r+b.w/2)*(r+b.w/2)) this.damageBlocker(b,dmg);
  },
  damageEnemy(e,dmg,opt={}){
    let final=dmg;
    if(P.mode==='hero'&&P.hero.crit>0&&Math.random()<P.hero.crit){ final*=3;
      FX.textW(e.lx,e.z-e.r-8,'CRIT '+Math.round(final),'#ffd34e',17); }
    else if(!opt.dot) FX.textW(e.lx,e.z,Math.round(final),opt.zap?'#9fe6ff':'#fff');
    e.hp-=final; e.flash=.08;
    P.dmgDealt+=final; P.dpsWindow+=final;
    if(!opt.dot&&!opt.noExpl){
      this.applyHitMods(e);
      if(P.mods.expl) this.explode(e.lx,e.z,this.effDamage(10),52);
    }
    if(e.hp<=0) this.killEnemy(e);
  },
  killEnemy(e){
    const i=enemies.indexOf(e); if(i<0) return;
    enemies.splice(i,1);
    const t=Defs.ENEMIES[e.kind];
    P.kills++;
    P.score+=Math.round(t.pts*P.scoreMult*(1+P.time/120));
    if(Math.random()<Math.min(1,t.coin)||t.coin>=1){
      const c=Math.max(1,Math.round((t.coin>=1?t.coin:1)));
      this.earnCoins(c,e.lx,e.z);
    }
    if(P.mode==='hero'){ P.hero.xp+=e.boss?40:(t.pts>=35?4:t.pts>=20?2:1); Hero.checkLevel(); }
    FX.burstW(e.lx,e.z,t.color,e.boss?40:8,e.boss?260:130,.5,e.boss?5:3);
    Audio2.play('hit');
    if(e.boss && Modes.current==='stage') Game.stageClear();
  },
  damageCrate(c,dmg){
    c.hp-=dmg;
    P.dpsWindow+=Math.min(dmg,c.hp+dmg);
    if(c.hp<=0){
      const i=crates.indexOf(c); if(i>=0) crates.splice(i,1);
      P.score+=Math.round(25*P.scoreMult);
      FX.burstW(c.lx,c.z,'#a06a32',12,150,.45,4);
      Crates.activate(c);
    }
  },
  damageBlocker(b,dmg){
    b.hp-=dmg;
    P.dpsWindow+=Math.min(dmg,b.hp+dmg);
    if(b.hp<=0){
      const i=blockers.indexOf(b); if(i>=0) blockers.splice(i,1);
      P.score+=Math.round(60*P.scoreMult);
      this.earnCoins(irand(3,6),b.lx,b.z);
      Audio2.play('boom'); Renderer.shake(2);
      FX.burstW(b.lx,b.z,'#9aa0a8',16,170,.5,4);
      FX.burstW(b.lx,b.z,'#ffb347',8,140,.4,4);
    }
  },
  earnCoins(n,lx,z){
    const total=Math.max(1,Math.round(n*Perks.coinMult()*(P.mode==='hero'?P.hero.coinMult:1)));
    P.coins+=total;
    Audio2.play('coin');
    if(lx!==undefined) FX.textW(lx,z,'+'+total+'🪙','#ffc83d',13);
  },
  giveNextWeapon(){
    if(P.weaponIdx<Defs.WEAPON_ORDER.length-1){
      P.weaponIdx=Math.min(P.weaponIdx+1,Defs.WEAPON_ORDER.length-1);
      P.weapon=Defs.WEAPON_ORDER[P.weaponIdx];
      P.mods.unique=0; P.spinup=0;
      toast(Defs.WEAPONS[P.weapon].ico+' '+Defs.WEAPONS[P.weapon].name+'!');
      Audio2.play('pickup');
    } else this.earnCoins(15,P.lx,40);
    HUD.refreshChips();
  }
};

/* ═══════════════════════════ CRATE REWARDS ═══════════════════════════ */
const Crates={
  activate(c){
    Audio2.play('pickup');
    const k=c.kind;
    switch(k){
      case 'coins': Combat.earnCoins(irand(8,18),c.lx,c.z); break;
      case 'weapon': Combat.giveNextWeapon(); break;
      case 'power': case 'rapid': case 'spread': case 'fire': case 'poison': case 'expl':
        if(P.mods[k]<Defs.MODS[k].max){ P.mods[k]++;
          toast(Defs.MODS[k].ico+' '+Defs.MODS[k].name+(Defs.MODS[k].max>1?' Lv.'+P.mods[k]:'')); }
        else Combat.earnCoins(10,c.lx,c.z);
        break;
      case 'unique':
        if(!P.mods.unique){ P.mods.unique=1;
          const u=Defs.UNIQUES[P.weapon];
          toast('⭐ '+u.name+'<br><small>'+u.desc+'</small>',2000); }
        else Combat.earnCoins(12,c.lx,c.z);
        break;
      case 'heal':
        if(P.mode==='army'){ P.troops=Math.min(99,P.troops+2); toast('🪖 +2 Troops'); }
        else { P.hp=Math.min(P.maxHp,P.hp+P.maxHp*.35); toast('❤️ Healed'); }
        break;
      case 'nuke':
        Renderer.shake(8); Audio2.play('boom');
        for(const e of enemies.slice()) if(!e.boss) Combat.damageEnemy(e,99999,{dot:true});
        toast('☢️ NUKE!');
        break;
      case 'shield': P.shield=6; toast('🛡️ Shield 6s'); break;
      case 'mult': P.scoreMult=Math.min(5,P.scoreMult+1); P.scoreMultT=20;
        toast('✖️ Score ×'+P.scoreMult+' (20s)'); break;
    }
    HUD.refreshChips();
  }
};

/* ═══════════════════════════ HERO LEVELING ═══════════════════════════ */
const Hero={
  checkLevel(){
    if(Engine.state==='levelup') return; // queue further levels until card chosen
    const h=P.hero;
    if(h.xp>=h.xpNeed){
      h.xp-=h.xpNeed; h.lvl++;
      h.xpNeed=Math.round(h.xpNeed*1.35+4);
      this.offer();
    }
  },
  offer(){
    Engine.setState('levelup');
    Audio2.play('level');
    $('lvlSub').textContent='Hero level '+P.hero.lvl+' — choose a skill';
    const pool=Defs.HERO_SKILLS.filter(s=>{
      if(s.id==='hweapon') return P.weaponIdx<Defs.WEAPON_ORDER.length-1 && P.hero.lvl%3===0;
      return true;
    });
    const picks=[];
    while(picks.length<3 && pool.length){
      const i=Math.floor(Math.random()*pool.length);
      picks.push(pool.splice(i,1)[0]);
    }
    $('lvlCards').innerHTML=picks.map(s=>
      `<div class="card" data-skill="${s.id}"><div class="ico">${s.ico}</div><div class="nm">${s.name}</div><div class="ds">${s.desc}</div></div>`).join('');
    $('lvlCards').querySelectorAll('.card').forEach(el=>{
      el.onclick=()=>{
        const s=Defs.HERO_SKILLS.find(x=>x.id===el.dataset.skill);
        s.apply(P.hero);
        Engine.setState('playing'); UI.show(null);
        HUD.refreshChips();
        Hero.checkLevel(); // banked XP may grant another level
      };
    });
    UI.show('scrLevel');
  }
};

/* ═══════════════════════════ SQUAD (formation + rendering) ═══════════════════════════ */
const Squad={
  offset(i,n){
    if(n===1) return {x:0,y:0};
    const a=i*2.39996, r=7+Math.sqrt(i)*9.5;
    return {x:Math.cos(a)*r*.95, y:Math.sin(a)*r*.55};
  },
  draw(g){
    const n=Math.min(Combat.shooterCount(),28);
    const px=240+P.lx, py=CAM.playerY();
    const wob=Math.sin(P.time*9)*1.4;
    const shadows=Settings.budget().shadows;
    for(let i=n-1;i>=0;i--){
      const o=this.offset(i,n);
      this.drawSoldier(g,px+o.x,py+o.y+(i%2?wob:-wob),P.mode==='hero'?1.35:1,shadows);
    }
    if(P.shield>0){
      g.strokeStyle='rgba(120,220,255,'+(0.4+0.2*Math.sin(P.time*8))+')';
      g.lineWidth=3; g.beginPath();
      g.arc(px,py,30+Math.sqrt(n)*8,0,6.283); g.stroke();
    }
  },
  drawSoldier(g,x,y,s,shadow){
    const hero=P.mode==='hero';
    if(shadow){ g.fillStyle='rgba(10,20,30,.28)';
      g.beginPath(); g.ellipse(x,y+14*s,10*s,4*s,0,0,6.283); g.fill(); }
    if(Sprites.on()){
      Sprites.unit(g,hero?'hero':'soldier',x,y+15*s,36*s,P.time,false);
      return;
    }
    // legs
    g.fillStyle='#b08648';
    g.fillRect(x-6*s,y+6*s,4.5*s,9.5*s); g.fillRect(x+1.5*s,y+6*s,4.5*s,9.5*s);
    g.fillStyle='#2f2f38'; // boots
    g.fillRect(x-6.5*s,y+13*s,5.5*s,3.5*s); g.fillRect(x+1*s,y+13*s,5.5*s,3.5*s);
    // torso (back view) + outline
    g.fillStyle=hero?'#4d8fd1':'#e8e2d2';
    g.strokeStyle='rgba(25,30,45,.5)'; g.lineWidth=1.4;
    g.beginPath(); g.ellipse(x,y,9*s,11*s,0,0,6.283); g.fill(); g.stroke();
    // harness strap
    g.strokeStyle=hero?'#234e7c':'#b8542f'; g.lineWidth=2.4*s;
    g.beginPath(); g.moveTo(x-7*s,y-7*s); g.lineTo(x+7*s,y+6*s); g.stroke();
    // gun across shoulder
    g.fillStyle='#23232c';
    g.fillRect(x+3.5*s,y-18*s,3.4*s,14*s);
    g.fillRect(x+2*s,y-7*s,6.4*s,3*s);
    // helmet w/ highlight
    g.fillStyle=hero?'#2e6db3':'#e8b23a';
    g.beginPath(); g.arc(x,y-9.5*s,6.6*s,0,6.283); g.fill();
    g.strokeStyle='rgba(25,30,45,.45)'; g.lineWidth=1.2; g.stroke();
    g.fillStyle='rgba(255,255,255,.3)';
    g.beginPath(); g.arc(x-2*s,y-11.5*s,2.6*s,0,6.283); g.fill();
  }
};

/* ═══════════════════════════ DRAW (pseudo-3D world) ═══════════════════════════ */
const Draw={
  scroll:0, roadSpd:74, clouds:null, sparkles:null,
  initSky(){
    this.clouds=[]; this.sparkles=[];
    for(let i=0;i<4;i++) this.clouds.push({x:rand(0,480),y:rand(8,60),s:rand(.6,1.3),spd:rand(4,9)});
    for(let i=0;i<26;i++) this.sparkles.push({x:rand(0,480),t:rand(0,3)});
  },
  background(g,dt){
    if(!this.clouds) this.initSky();
    const LH=Renderer.LH, hy=CAM.horizonY(), py=CAM.playerY();
    this.scroll=(this.scroll+this.roadSpd*dt)%70;
    /* ── sky ── */
    let grad=g.createLinearGradient(0,0,0,hy);
    grad.addColorStop(0,'#4aa6e8'); grad.addColorStop(.75,'#a8dcf5'); grad.addColorStop(1,'#dff2fb');
    g.fillStyle=grad; g.fillRect(0,0,480,hy);
    if(Settings.data.glow){ // sun
      g.fillStyle='rgba(255,250,210,.85)';
      g.beginPath(); g.arc(398,hy*.32,22,0,6.283); g.fill();
      g.fillStyle='rgba(255,250,210,.18)';
      g.beginPath(); g.arc(398,hy*.32,44,0,6.283); g.fill();
    }
    g.fillStyle='rgba(255,255,255,.88)';
    for(const c of this.clouds){
      c.x-=c.spd*dt; if(c.x<-70) c.x=540;
      const cy=hy*.2+c.y;
      g.beginPath();
      g.ellipse(c.x,cy,26*c.s,9*c.s,0,0,6.283);
      g.ellipse(c.x+18*c.s,cy+3,18*c.s,7*c.s,0,0,6.283);
      g.ellipse(c.x-18*c.s,cy+3,16*c.s,6*c.s,0,0,6.283);
      g.fill();
    }
    /* ── distant skyline on the horizon ── */
    g.fillStyle='rgba(70,110,150,.55)';
    for(let i=0;i<15;i++){
      const bw=14+(i*37)%16, bh=8+(i*53)%26, bx=i*33+((i*19)%12);
      g.fillRect(bx,hy-bh,bw,bh);
    }
    /* ── sea ── */
    grad=g.createLinearGradient(0,hy,0,LH);
    grad.addColorStop(0,'#2e86c4'); grad.addColorStop(1,'#155a8c');
    g.fillStyle=grad; g.fillRect(0,hy,480,LH-hy);
    if(Settings.data.glow){
      g.fillStyle='rgba(255,255,255,.35)';
      for(const sp of this.sparkles){
        sp.t+=dt; if(sp.t>3){ sp.t=0; sp.x=rand(0,480); }
        const a=Math.sin(sp.t/3*Math.PI);
        const sy=hy+6+((sp.x*7.3)%(LH-hy-12));
        g.globalAlpha=a*.5; g.fillRect(sp.x,sy,5,1.6);
      }
      g.globalAlpha=1;
    }
    /* ── bridge road: truncated trapezoid — keeps real width at the far end
          (edges still aim at the vanishing point, but the deck stops at zMax) ── */
    const farY=CAM.project(0,CAM.zMax).y;
    const edgeX=(side,y)=>240+side*(ROAD.half+14)*(y-hy)/(py-hy);
    const laneX=(side,y)=>240+side*ROAD.half*(y-hy)/(py-hy);
    // deck polygon (slightly wider than playfield)
    g.fillStyle='#cfcabf';
    g.beginPath();
    g.moveTo(edgeX(-1,LH),LH); g.lineTo(edgeX(-1,farY),farY);
    g.lineTo(edgeX(1,farY),farY); g.lineTo(edgeX(1,LH),LH);
    g.closePath(); g.fill();
    // shoulder strips
    g.strokeStyle='#b3aea3'; g.lineWidth=5;
    for(const sd of [-1,1]){
      g.beginPath(); g.moveTo(laneX(sd*1.04,LH),LH); g.lineTo(laneX(sd*1.04,farY),farY); g.stroke();
    }
    // guard rails (red) with posts
    g.strokeStyle='#a03434'; g.lineWidth=4;
    for(const sd of [-1,1]){
      g.beginPath(); g.moveTo(edgeX(sd,LH),LH); g.lineTo(edgeX(sd,farY),farY); g.stroke();
    }
    g.fillStyle='#7e2a2a';
    for(let z=70-this.scroll;z<CAM.zMax;z+=70){
      const p=CAM.project(0,z), s=p.s;
      for(const sd of [-1,1]){
        const x=240+sd*(ROAD.half+14)*s;
        g.fillRect(x-2*s,p.y-12*s,4*s,12*s);
      }
    }
    // center dashes (projected, scrolling toward the player)
    g.fillStyle='rgba(0,0,0,.16)';
    for(let z=70-this.scroll;z<CAM.zMax;z+=70){
      const p1=CAM.project(0,z), p2=CAM.project(0,Math.min(z+30,CAM.zMax));
      g.fillRect(240-3.4*p1.s,p2.y,6.8*p1.s,Math.max(1,p1.y-p2.y));
    }
    // deck seams
    if(Settings.data.glow){
      g.strokeStyle='rgba(0,0,0,.06)'; g.lineWidth=1.5;
      for(let z=35-this.scroll%35;z<CAM.zMax;z+=140){
        const p=CAM.project(0,z);
        g.beginPath(); g.moveTo(laneX(-1.02,p.y),p.y); g.lineTo(laneX(1.02,p.y),p.y); g.stroke();
      }
    }
    /* ── horizon haze: covers the gap between sea horizon and road end ── */
    grad=g.createLinearGradient(0,hy-4,0,farY+34);
    grad.addColorStop(0,'rgba(223,242,251,.97)');
    grad.addColorStop(.55,'rgba(223,242,251,.8)');
    grad.addColorStop(1,'rgba(223,242,251,0)');
    g.fillStyle=grad; g.fillRect(0,hy-4,480,farY+38-hy);
  },
  shadow(g,p,w){
    if(!Settings.budget().shadows) return;
    g.fillStyle='rgba(10,20,30,.25)';
    g.beginPath(); g.ellipse(p.x,p.y+3,w*p.s,w*.36*p.s,0,0,6.283); g.fill();
  },
  enemy(g,e){
    const t=Defs.ENEMIES[e.kind];
    const p=CAM.project(e.lx,e.z);
    const s=p.s*(e.r/13)*1.15;
    const a=CAM.fade(e.z);
    if(a<=0) return;
    const wob=Math.sin(e.wob+P.time*10)*2*s;
    this.shadow(g,p,12*(e.r/13));
    if(Sprites.on()){
      const flip=e.lx>P.lx; // face toward the squad
      const h=e.boss?120*p.s:e.r*2.7*p.s;
      Sprites.unit(g,e.kind,p.x,p.y+12*s,h,P.time+e.wob,flip,a*(e.flash>0?.55:1));
      if(e.burnT>0){ g.globalAlpha=a*.5; g.fillStyle='rgba(255,120,20,.8)';
        g.beginPath(); g.arc(p.x,p.y-8*s,10*s,0,6.283); g.fill(); g.globalAlpha=1; }
      if(e.poisT>0){ g.globalAlpha=a*.4; g.fillStyle='rgba(80,220,60,.8)';
        g.beginPath(); g.arc(p.x,p.y-8*s,10*s,0,6.283); g.fill(); g.globalAlpha=1; }
    } else {
    g.save(); g.translate(p.x,p.y); g.globalAlpha=a*(e.flash>0?.6:1);
    // legs
    g.fillStyle=t.color2;
    g.fillRect(-6*s,4*s+wob*.5,4.5*s,9*s); g.fillRect(1.5*s,4*s-wob*.5,4.5*s,9*s);
    // body facing the player (down-screen)
    g.fillStyle=t.color;
    g.strokeStyle='rgba(20,10,10,.5)'; g.lineWidth=Math.max(1,1.4*s);
    g.beginPath(); g.ellipse(0,0,9*s,11*s,0,0,6.283); g.fill(); g.stroke();
    // arms out
    g.fillStyle=t.color2;
    g.beginPath(); g.ellipse(-9.5*s,wob*.3,3.4*s,5.5*s,-.3,0,6.283); g.fill();
    g.beginPath(); g.ellipse(9.5*s,-wob*.3,3.4*s,5.5*s,.3,0,6.283); g.fill();
    // head w/ angry face
    g.fillStyle='#e8c39e';
    g.beginPath(); g.arc(0,-10*s,5.5*s,0,6.283); g.fill();
    g.strokeStyle='rgba(20,10,10,.4)'; g.stroke();
    g.fillStyle='#3a1f12';
    g.fillRect(-3.5*s,-11*s,2.4*s,1.7*s); g.fillRect(1.1*s,-11*s,2.4*s,1.7*s);
    g.fillRect(-1.6*s,-7.5*s,3.2*s,1.3*s); // snarl
    if(e.burnT>0){ g.fillStyle='rgba(255,120,20,.5)';
      g.beginPath(); g.arc(0,-4*s,9*s,0,6.283); g.fill(); }
    if(e.poisT>0){ g.fillStyle='rgba(80,220,60,.38)';
      g.beginPath(); g.arc(0,-4*s,9*s,0,6.283); g.fill(); }
    g.restore();
    }
    // hp bar (elites & boss)
    if((e.boss||e.maxHp>110)&&a>.5){
      const w=(e.boss?84:32)*Math.max(p.s,.5);
      const by=p.y-(e.r+16)*s*1.4;
      g.fillStyle='rgba(0,0,0,.5)'; g.fillRect(p.x-w/2,by,w,5);
      g.fillStyle=e.boss?'#ff4040':'#ffad33';
      g.fillRect(p.x-w/2,by,w*clamp(e.hp/e.maxHp,0,1),5);
      if(e.boss){ g.fillStyle='#fff'; g.font='bold 11px sans-serif'; g.textAlign='center';
        g.fillText(fmt(Math.ceil(e.hp)),p.x,by-4); }
    }
  },
  crate(g,c){
    const p=CAM.project(c.lx,c.z), s=p.s, a=CAM.fade(c.z);
    if(a<=0) return;
    this.shadow(g,p,22);
    g.save(); g.translate(p.x,p.y); g.globalAlpha=a;
    g.fillStyle='#9c6a35';
    g.beginPath(); g.ellipse(0,0,24*s,19*s,0,0,6.283); g.fill();
    g.fillStyle='#b5824a';
    g.beginPath(); g.ellipse(0,-11*s,24*s,8*s,0,0,6.283); g.fill();
    g.strokeStyle='rgba(50,30,10,.5)'; g.lineWidth=Math.max(1,1.5*s);
    g.beginPath(); g.ellipse(0,0,24*s,19*s,0,0,6.283); g.stroke();
    g.fillStyle='#5d3d1c'; g.fillRect(-24*s,-4*s,48*s,4*s); g.fillRect(-24*s,6*s,48*s,3*s);
    const fs=Math.max(9,15*s);
    g.font=fs+'px sans-serif'; g.textAlign='center'; g.fillText(c.ico,0,-14*s);
    const hs=Math.max(11,20*s);
    g.font='900 '+hs+'px sans-serif';
    g.lineWidth=4*Math.max(s,.5); g.strokeStyle='#7a2810'; g.fillStyle='#fff';
    g.strokeText(Math.ceil(c.hp),0,8*s); g.fillText(Math.ceil(c.hp),0,8*s);
    g.restore();
  },
  blocker(g,b){
    const p=CAM.project(b.lx,b.z), s=p.s, a=CAM.fade(b.z);
    if(a<=0) return;
    const hw=b.w/2*s, h=30*s;
    this.shadow(g,p,b.w*.55);
    if(Sprites.on()){ // boulder pile blocking the road
      g.globalAlpha=a;
      Sprites.cell(g,'rock1',p.x-b.w*.2*s,p.y+2*s,b.w*.62*s,b.w*.62*s);
      Sprites.cell(g,'rock2',p.x+b.w*.24*s,p.y+3*s,b.w*.55*s,b.w*.55*s);
      const hs=Math.max(11,18*s);
      g.font='900 '+hs+'px sans-serif'; g.textAlign='center';
      g.lineWidth=4*Math.max(s,.5); g.strokeStyle='#363a40'; g.fillStyle='#fff';
      g.strokeText(Math.ceil(b.hp),p.x,p.y-h*.5); g.fillText(Math.ceil(b.hp),p.x,p.y-h*.5);
      g.globalAlpha=1;
      return;
    }
    g.save(); g.translate(p.x,p.y); g.globalAlpha=a;
    // concrete jersey barrier
    g.fillStyle='#a9adb3';
    g.beginPath();
    g.moveTo(-hw,0); g.lineTo(-hw*.78,-h); g.lineTo(hw*.78,-h); g.lineTo(hw,0);
    g.closePath(); g.fill();
    g.strokeStyle='rgba(40,45,55,.6)'; g.lineWidth=Math.max(1,1.6*s); g.stroke();
    g.fillStyle='#878b92';
    g.fillRect(-hw,0,hw*2,6*s);
    // hazard stripes
    g.save(); g.beginPath();
    g.moveTo(-hw*.9,-h*.75); g.lineTo(hw*.9,-h*.75); g.lineTo(hw*.95,-h*.3); g.lineTo(-hw*.95,-h*.3);
    g.closePath(); g.clip();
    for(let x=-hw;x<hw;x+=16*s){
      g.fillStyle='#e8b23a'; g.fillRect(x,-h,8*s,h);
      g.fillStyle='#2f2f38'; g.fillRect(x+8*s,-h,8*s,h);
    }
    g.restore();
    const hs=Math.max(11,18*s);
    g.font='900 '+hs+'px sans-serif'; g.textAlign='center';
    g.lineWidth=4*Math.max(s,.5); g.strokeStyle='#363a40'; g.fillStyle='#fff';
    g.strokeText(Math.ceil(b.hp),0,-h*.32); g.fillText(Math.ceil(b.hp),0,-h*.32);
    g.restore();
  },
  gate(g,gt){
    const a=CAM.fade(gt.z); if(a<=0) return;
    const z0=gt.z-12, z1=gt.z+12;
    const c00=CAM.project(gt.l0,z0), c10=CAM.project(gt.l1,z0),
          c01=CAM.project(gt.l0,z1), c11=CAM.project(gt.l1,z1);
    const pos=gt.val>=0;
    g.globalAlpha=a;
    g.fillStyle=pos?'rgba(60,140,255,.42)':'rgba(255,60,60,.42)';
    g.beginPath();
    g.moveTo(c01.x,c01.y); g.lineTo(c11.x,c11.y); g.lineTo(c10.x,c10.y); g.lineTo(c00.x,c00.y);
    g.closePath(); g.fill();
    g.strokeStyle=pos?'#7db8ff':'#ff9090'; g.lineWidth=2; g.stroke();
    const mid=CAM.project((gt.l0+gt.l1)/2,gt.z);
    const fs=Math.max(13,22*mid.s);
    g.fillStyle='#fff'; g.font='900 '+fs+'px sans-serif'; g.textAlign='center';
    g.fillText((pos?'+':'')+gt.val, mid.x, mid.y+fs*.35);
    g.globalAlpha=1;
  },
  bullet(g,b){
    const p=CAM.project(b.lx,b.z), s=p.s;
    if(b.flame){
      const a=1-b.traveled/(b.range||200);
      g.fillStyle=`rgba(255,${Math.floor(120+100*a)},30,${.5*a+.2})`;
      g.beginPath(); g.arc(p.x,p.y,(4+9*(1-a))*s,0,6.283); g.fill();
      return;
    }
    g.fillStyle=b.kind==='sniper'?'#bfe8ff':b.grenade?'#ffd34e':'#fff3c0';
    g.beginPath(); g.ellipse(p.x,p.y,2.6*s,8*s,0,0,6.283); g.fill();
    if(Settings.data.glow){
      g.fillStyle='rgba(255,220,120,.25)';
      g.beginPath(); g.arc(p.x,p.y,5.5*s,0,6.283); g.fill();
    }
  }
};

/* ═══════════════════════════ HUD ═══════════════════════════ */
const HUD={
  tick:0,
  refreshChips(){
    const parts=[];
    const w=Defs.WEAPONS[P.weapon];
    parts.push(`<span class="chip wpn">${w.ico} ${w.name}${P.mods.unique?' ⭐':''}</span>`);
    for(const k of ['power','rapid','spread'])
      if(P.mods[k]>0) parts.push(`<span class="chip">${Defs.MODS[k].ico} ${Defs.MODS[k].name} ${P.mods[k]}</span>`);
    for(const k of ['fire','poison','expl'])
      if(P.mods[k]>0) parts.push(`<span class="chip hot">${Defs.MODS[k].ico} ${Defs.MODS[k].name}</span>`);
    if(P.scoreMultT>0) parts.push(`<span class="chip hot">✖️ SCORE ×${P.scoreMult}</span>`);
    if(P.shield>0) parts.push(`<span class="chip">🛡️ SHIELD</span>`);
    $('modChips').innerHTML=parts.join('');
  },
  update(dt){
    this.tick-=dt; if(this.tick>0) return;
    this.tick=.15;
    $('progFill').style.width=(Modes.progress*100)+'%';
    $('progText').textContent=Modes.def.label()+' — '+Modes.def.hudProg();
    $('coinVal').textContent=fmt(P.coins);
    $('scoreVal').textContent=fmt(P.score);
    $('dpsVal').textContent=fmt(P.dps);
    if(P.mode==='army'){
      $('hpFill').style.width='100%';
      $('hpFill').style.background='linear-gradient(90deg,#2f9dff,#7ad1ff)';
      $('hpText').textContent='🪖 TROOPS: '+P.troops;
    }else{
      $('hpFill').style.width=clamp(P.hp/P.maxHp*100,0,100)+'%';
      $('hpFill').style.background='';
      $('hpText').textContent=Math.ceil(P.hp)+' / '+P.maxHp;
    }
  }
};

/* ═══════════════════════════ UI / SCREENS ═══════════════════════════ */
const UI={
  screens:['scrMenu','scrArmory','scrSettings','scrPause','scrOver','scrLevel'],
  show(id){
    for(const s of this.screens) $(s).classList.toggle('open',s===id);
    $('hud').style.display=(Engine.state==='playing'||id==='scrPause'||id==='scrLevel')?'block':'none';
  },
  refreshMenu(){
    $('menuCoins').textContent=fmt(Save.data.coins);
    const b=Save.data.best;
    $('bestStage').textContent=Save.data.stageReached>1?'reached stage '+Save.data.stageReached+' · best '+fmt(b.stage):'';
    $('bestEndless').textContent=b.endless?'best '+fmt(b.endless):'';
    $('bestArmy').textContent=b.army?'best '+fmt(b.army):'';
    $('bestHero').textContent=b.hero?'best '+fmt(b.hero):'';
  },
  buildArmory(){
    $('armoryCoins').textContent=fmt(Save.data.coins);
    $('perkList').innerHTML=Defs.PERKS.map(p=>{
      const lvl=Perks.level(p.id), maxed=lvl>=p.max, cost=p.cost(lvl);
      const pips=Array.from({length:p.max},(_,i)=>`<span class="pip${i<lvl?' on':''}"></span>`).join('');
      return `<div class="perk"><div class="rowflex" style="margin:0">
        <div><span class="nm">${p.ico} ${p.name}</span><div class="ds">${p.desc}</div>
          <span class="pips">${pips}</span></div>
        <div style="text-align:right">
          <label style="font-size:10px;display:${lvl?'block':'none'}">ON <input type="checkbox" data-toggle="${p.id}" ${Save.data.perkOn[p.id]!==false?'checked':''}></label>
          <button class="buy" data-perk="${p.id}" ${maxed||Save.data.coins<cost?'disabled':''}>
            ${maxed?'MAX':'🪙 '+fmt(cost)}</button>
        </div></div></div>`;
    }).join('');
    $('multList').innerHTML=Defs.COIN_MULTS.map(m=>{
      const owned=!!Save.data.mults[m.id];
      return `<div class="perk"><div class="rowflex" style="margin:0">
        <span class="nm">✖️ ${m.name}</span>
        <div>${owned
          ?`<label style="font-size:11px">ON <input type="checkbox" data-mtoggle="${m.id}" ${Save.data.multOn[m.id]!==false?'checked':''}></label>`
          :`<button class="buy" data-mult="${m.id}" ${Save.data.coins<m.cost?'disabled':''}>🪙 ${fmt(m.cost)}</button>`}
        </div></div></div>`;
    }).join('');
    $('perkList').querySelectorAll('[data-perk]').forEach(b=>b.onclick=()=>{
      const p=Defs.PERKS.find(x=>x.id===b.dataset.perk);
      const lvl=Perks.level(p.id), cost=p.cost(lvl);
      if(lvl>=p.max||Save.data.coins<cost) return;
      Save.data.coins-=cost; Save.data.perks[p.id]=lvl+1; Save.save();
      Audio2.play('pickup'); this.buildArmory();
    });
    $('perkList').querySelectorAll('[data-toggle]').forEach(c=>c.onchange=()=>{
      Save.data.perkOn[c.dataset.toggle]=c.checked; Save.save(); });
    $('multList').querySelectorAll('[data-mult]').forEach(b=>b.onclick=()=>{
      const m=Defs.COIN_MULTS.find(x=>x.id===b.dataset.mult);
      if(Save.data.coins<m.cost) return;
      Save.data.coins-=m.cost; Save.data.mults[m.id]=true; Save.save();
      Audio2.play('pickup'); this.buildArmory();
    });
    $('multList').querySelectorAll('[data-mtoggle]').forEach(c=>c.onchange=()=>{
      Save.data.multOn[c.dataset.mtoggle]=c.checked; Save.save(); });
  },
  init(){
    document.querySelectorAll('#scrMenu [data-mode]').forEach(b=>
      b.onclick=()=>{ Audio2.ensure(); Game.start(b.dataset.mode); });
    $('btnArmory').onclick=()=>{ this.buildArmory(); this.show('scrArmory'); };
    $('btnSettings').onclick=()=>this.show('scrSettings');
    document.querySelectorAll('[data-back]').forEach(b=>b.onclick=()=>{
      if(Engine.state==='paused') this.show('scrPause');
      else { this.refreshMenu(); this.show('scrMenu'); }
    });
    $('btnPause').onclick=()=>Engine.togglePause();
    $('btnResume').onclick=()=>Engine.togglePause();
    $('btnPauseSettings').onclick=()=>this.show('scrSettings');
    $('btnQuit').onclick=()=>Game.end(false,true);
    $('btnRetry').onclick=()=>Game.start(Modes.current);
    $('btnOverMenu').onclick=()=>{ Engine.setState('menu'); this.refreshMenu(); this.show('scrMenu'); };
    $('btnNext').onclick=()=>{ Game.pendingStage=Modes.stage+1; Game.start('stage'); };
  }
};

/* ═══════════════════════════ GAME (run lifecycle) ═══════════════════════════ */
const Game={
  pendingStage:null, ending:false, endingT:0, popT:0,
  start(mode){
    Modes.current=mode;
    this.ending=false;
    P=newPlayer(mode);
    enemies.length=bullets.length=crates.length=gates.length=blockers.length=0;
    particles.length=floaters.length=beams.length=0;
    Modes.progress=0; Modes.bossSpawned=false;
    Modes.def.init();
    this.pendingStage=null;
    Spawner.reset();
    Engine.setState('playing');
    UI.show(null);
    HUD.refreshChips();
    if(!Save.data.seenHint){ toast('👆 Drag to move — destroy barrels for power-ups,<br>dodge or destroy the concrete barriers!',3200);
      Save.data.seenHint=true; Save.save(); }
  },
  stageClear(){ // boss down — play the victory sequence instead of cutting away
    if(this.ending) return;
    this.ending=true; this.endingT=2.6; this.popT=.2;
    Audio2.play('level'); Renderer.shake(6);
  },
  finishStage(){
    this.ending=false;
    const bonus=Math.round(500*Modes.stage*P.scoreMult);
    P.score+=bonus;
    Combat.earnCoins(25+Modes.stage*10);
    Save.data.stageReached=Math.max(Save.data.stageReached,Modes.stage+1);
    this.end(true);
  },
  end(victory,quiet){
    const banked=Math.round(P.coins);
    Save.data.coins+=banked;
    const bestKey=Modes.current;
    if(P.score>Save.data.best[bestKey]) Save.data.best[bestKey]=P.score;
    Save.save();
    if(quiet){ Engine.setState('menu'); UI.refreshMenu(); UI.show('scrMenu'); return; }
    Engine.setState('over');
    $('overTitle').textContent=victory?'STAGE CLEAR!':'DEFEATED';
    $('overTitle').style.color=victory?'var(--green)':'var(--red)';
    $('overStats').innerHTML=
      `<span>Score</span><b>${fmt(P.score)}</b>
       <span>Best</span><b>${fmt(Save.data.best[bestKey])}</b>
       <span>Kills</span><b>${P.kills}</b>
       <span>Time</span><b>${Math.floor(P.time)}s</b>
       <span>Coins earned</span><b>🪙 ${fmt(banked)}</b>
       <span>Total coins</span><b>🪙 ${fmt(Save.data.coins)}</b>`;
    $('btnNext').style.display=(victory&&Modes.current==='stage')?'block':'none';
    UI.show('scrOver');
  },
  hurt(dmg,troopLoss=1){
    if(P.shield>0||this.ending) return; // invulnerable during the victory lap
    Audio2.play('hurt'); Renderer.shake(4);
    if(P.mode==='army'){
      P.troops-=troopLoss;
      FX.textW(P.lx,30,'-'+troopLoss+' 🪖','#ff6060',16);
      if(P.troops<=0){ P.troops=0; this.end(false); }
    }else{
      P.hp-=dmg;
      FX.textW(P.lx,30,'-'+Math.round(dmg),'#ff6060',16);
      if(P.hp<=0) this.end(false);
    }
  },

  /* ── per-frame simulation ── */
  update(dt){
    if(this.ending){ // victory sequence: slow-mo, mop up remaining enemies
      this.endingT-=dt; this.popT-=dt;
      if(this.popT<=0&&enemies.length){
        this.popT=.09;
        Combat.damageEnemy(enemies[Math.floor(Math.random()*enemies.length)],1e9,{dot:true});
      }
      if(this.endingT<=0){ this.finishStage(); return; }
      dt*=.45;
    }
    P.time+=dt;
    if(P.scoreMultT>0){ P.scoreMultT-=dt; if(P.scoreMultT<=0){ P.scoreMult=1; HUD.refreshChips(); } }
    if(P.shield>0){ P.shield-=dt; if(P.shield<=0) HUD.refreshChips(); }
    P.score+=dt*2*P.scoreMult;
    P.dpsTimer+=dt;
    if(P.dpsTimer>=1){ P.dps=Math.round(P.dpsWindow/P.dpsTimer); P.dpsWindow=0; P.dpsTimer=0; }

    // movement (lateral)
    let tx=P.lx;
    if(Input.down) tx=Input.x-240;
    if(Input.keys['ArrowLeft']||Input.keys['a']) tx=P.lx-P.speed*dt*1.5;
    if(Input.keys['ArrowRight']||Input.keys['d']) tx=P.lx+P.speed*dt*1.5;
    const pad=14+Math.sqrt(Math.min(Combat.shooterCount(),28))*7;
    tx=clamp(tx,-ROAD.half+pad,ROAD.half-pad);
    P.lx+=clamp(tx-P.lx,-P.speed*dt,P.speed*dt);

    if(!this.ending){ Modes.def.update(dt); Spawner.update(dt); }
    Combat.updateFiring(dt);
    this.updateBullets(dt);
    this.updateEnemies(dt);
    this.updateCrates(dt);
    this.updateBlockers(dt);
    this.updateGates(dt);
    FX.update(dt);
    HUD.update(dt);
  },
  updateBullets(dt){
    for(let i=bullets.length-1;i>=0;i--){
      const b=bullets[i];
      const ml=b.lvx*dt,mz=b.zv*dt;
      b.lx+=ml; b.z+=mz; b.traveled+=Math.hypot(ml,mz);
      if(b.z>CAM.zMax-40||Math.abs(b.lx)>ROAD.half+40||(b.range&&b.traveled>=b.range)){
        if(b.grenade) Combat.explode(b.lx,b.z,Combat.effDamage(22),58);
        bullets.splice(i,1); continue;
      }
      let consumed=false;
      for(let j=enemies.length-1;j>=0;j--){
        const e=enemies[j];
        const rr=(e.r+(b.flame?11:6)); if(dist2(b.lx,b.z,e.lx,e.z)>rr*rr) continue;
        let dmg=b.dmg;
        if(b.falloff&&b.range) dmg*=clamp(1.25-b.traveled/b.range,.25,1.25);
        if(b.flame){
          Combat.damageEnemy(e,dmg*dt*22,{dot:Math.random()>.1});
          e.burn=Math.max(e.burn,Combat.effDamage(P.mods.unique&&P.weapon==='flamer'?8:3));
          e.burnT=P.mods.unique&&P.weapon==='flamer'?4:2;
          continue;
        }
        if(b.grenade){ Combat.explode(b.lx,b.z,Combat.effDamage(22),58); consumed=true; break; }
        Combat.damageEnemy(e,dmg);
        if(b.pierce>0){ b.pierce--; b.dmg*=.85; }
        else { consumed=true; }
        break;
      }
      if(!consumed){
        for(let j=crates.length-1;j>=0;j--){
          const c=crates[j];
          if(dist2(b.lx,b.z,c.lx,c.z)>(c.r+5)*(c.r+5)) continue;
          const dmg=b.flame?b.dmg*dt*22:b.dmg;
          Combat.damageCrate(c,dmg);
          if(!b.flame){ FX.textW(c.lx,c.z-26,Math.round(dmg),'#ffd9a0',12); consumed=true; }
          break;
        }
      }
      if(!consumed){
        for(let j=blockers.length-1;j>=0;j--){
          const bl=blockers[j];
          if(Math.abs(b.lx-bl.lx)>bl.w/2+5||Math.abs(b.z-bl.z)>18) continue;
          const dmg=b.flame?b.dmg*dt*22:b.dmg;
          Combat.damageBlocker(bl,dmg);
          if(!b.flame){ FX.textW(bl.lx,bl.z-26,Math.round(dmg),'#cfd6df',12); consumed=true; }
          break;
        }
      }
      if(!consumed&&P.mode==='army'){
        for(const gt of gates){
          if(Math.abs(b.z-gt.z)<16&&b.lx>=gt.l0&&b.lx<=gt.l1){
            gt.acc+=b.dmg;
            while(gt.acc>=30){ gt.acc-=30; gt.val=Math.min(gt.val+1,15); }
            consumed=true; break;
          }
        }
      }
      if(consumed) bullets.splice(i,1);
    }
  },
  updateEnemies(dt){
    const d=Modes.def.diff();
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i];
      e.flash=Math.max(0,e.flash-dt);
      e.z-=e.spd*dt;
      e.lx+=Math.sin(e.wob+P.time*2)*14*dt;
      if(!e.boss){ // hold lanes while far, converge on the squad when close
        const prox=1-e.z/CAM.zMax;
        e.lx+=(P.lx-e.lx)*(1.2*prox*prox)*dt;
      }
      e.lx=clamp(e.lx,-ROAD.half+e.r,ROAD.half-e.r);
      if(e.burnT>0){ e.burnT-=dt; e.hp-=e.burn*dt; P.dpsWindow+=e.burn*dt;
        if(Math.random()<dt*6) FX.burstW(e.lx,e.z,'#ff8c1a',1,50,.4,3);
        if(e.hp<=0){ Combat.killEnemy(e); continue; } }
      if(e.poisT>0){ e.poisT-=dt; e.hp-=e.pois*dt; P.dpsWindow+=e.pois*dt;
        if(Math.random()<dt*5) FX.burstW(e.lx,e.z,'#62d63e',1,40,.4,3);
        if(e.hp<=0){ Combat.killEnemy(e); continue; } }
      // reached the squad line
      if(e.z<=e.r+8){
        const t=Defs.ENEMIES[e.kind];
        if(e.boss){ Game.hurt(t.dmg,3); e.z+=130; }
        else{
          Game.hurt(t.dmg*Math.min(2.2,d*.6+0.8));
          enemies.splice(i,1);
          FX.burstW(e.lx,20,t.color,6,110,.4,3);
        }
        if(Engine.state!=='playing') return;
      }
    }
  },
  updateCrates(dt){
    for(let i=crates.length-1;i>=0;i--){
      const c=crates[i];
      c.z-=c.spd*dt;
      if(c.z<-30) crates.splice(i,1); // rolled past
    }
  },
  updateBlockers(dt){
    for(let i=blockers.length-1;i>=0;i--){
      const b=blockers[i];
      b.z-=b.spd*dt;
      if(!b.resolved && b.z<=18){
        b.resolved=true;
        // per-soldier contact: only soldiers actually touching the barrier are hit
        const n=Math.min(Combat.shooterCount(),28);
        let hits=0;
        for(let s=0;s<n;s++){
          const o=Squad.offset(s,n);
          if(Math.abs(P.lx+o.x-b.lx)<b.w/2+7) hits++;
        }
        if(hits>0){
          Audio2.play('crash'); Renderer.shake(6);
          FX.burstW(b.lx,b.z,'#9aa0a8',20,200,.6,5);
          FX.burstW(b.lx,b.z,'#ff5e2d',10,160,.5,4);
          blockers.splice(i,1); // barrier shatters on the soldiers it hit
          if(P.mode==='army') Game.hurt(0,Math.min(hits,5));
          else if(P.mode==='hero') Game.hurt(30);
          else Game.hurt(Math.min(45,10*hits));
          if(Engine.state!=='playing') return;
          continue;
        }
        // no contact — it slides harmlessly past the squad
      }
      if(b.z<-40) blockers.splice(i,1);
    }
  },
  updateGates(dt){
    for(let i=gates.length-1;i>=0;i--){
      const gt=gates[i];
      gt.z-=gt.spd*dt;
      if(gt.z<=14){
        if(P.lx>=gt.l0&&P.lx<=gt.l1){
          P.troops=clamp(P.troops+gt.val,0,99);
          FX.textW(P.lx,40,(gt.val>0?'+':'')+gt.val+' 🪖',gt.val>0?'#7db8ff':'#ff6060',18);
          Audio2.play(gt.val>0?'pickup':'hurt');
          if(P.troops<=0){ this.end(false); return; }
          gates.length=0; // remove the partner gate too
          HUD.refreshChips();
          break;
        }else{
          gates.splice(i,1);
        }
      }
    }
  },

  /* ── per-frame rendering ── */
  render(g,dt){
    Draw.background(g,Engine.state==='playing'?dt:0);
    // painter's order: far → near
    const drawList=[];
    for(const gt of gates) drawList.push({z:gt.z,f:()=>Draw.gate(g,gt)});
    for(const c of crates) drawList.push({z:c.z,f:()=>Draw.crate(g,c)});
    for(const b of blockers) drawList.push({z:b.z,f:()=>Draw.blocker(g,b)});
    for(const e of enemies) drawList.push({z:e.z,f:()=>Draw.enemy(g,e)});
    drawList.sort((a,b)=>b.z-a.z);
    for(const d of drawList) d.f();
    Squad.draw(g);
    for(const b of bullets) Draw.bullet(g,b);
    for(const bm of beams){
      const a=1-bm.t/bm.life;
      g.strokeStyle='rgba(160,230,255,'+a+')'; g.lineWidth=3;
      g.beginPath(); g.moveTo(bm.pts[0].x,bm.pts[0].y);
      for(let i=1;i<bm.pts.length;i++) g.lineTo(bm.pts[i].x,bm.pts[i].y);
      g.stroke();
      if(Settings.data.glow){
        g.strokeStyle='rgba(220,250,255,'+a*.7+')'; g.lineWidth=1.2; g.stroke();
      }
    }
    for(const p of particles){
      g.globalAlpha=1-p.t/p.life;
      g.fillStyle=p.color;
      g.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
    }
    g.globalAlpha=1;
    for(const f of floaters){
      g.globalAlpha=1-(f.t/f.life)*(f.t/f.life);
      g.font='900 '+f.size+'px sans-serif'; g.textAlign='center';
      g.lineWidth=3; g.strokeStyle='rgba(0,0,0,.6)';
      g.strokeText(f.str,f.x,f.y); g.fillStyle=f.color; g.fillText(f.str,f.x,f.y);
    }
    g.globalAlpha=1;
    if(Game.ending){ // pulsing victory banner
      const k=1+.06*Math.sin(P.time*12);
      g.save(); g.translate(240,Renderer.LH*.38); g.scale(k,k);
      g.font='900 44px sans-serif'; g.textAlign='center';
      g.lineWidth=9; g.strokeStyle='#7a4a08'; g.strokeText('STAGE CLEAR!',0,0);
      g.fillStyle='#ffd34e'; g.fillText('STAGE CLEAR!',0,0);
      g.restore();
    }
  }
};

/* ═══════════════════════════ ENGINE (loop + state machine) ═══════════════════════════ */
const Engine={
  state:'menu', last:0, acc:0,
  setState(s){ this.state=s; },
  togglePause(){
    if(this.state==='playing'){ this.setState('paused'); UI.show('scrPause'); }
    else if(this.state==='paused'){ this.setState('playing'); UI.show(null); }
  },
  loop(t){
    requestAnimationFrame(ts=>Engine.loop(ts));
    const cap=Settings.data.fps;
    if(cap>0){
      this.acc=(this.acc||0)+(t-(this._lastRaw||t)); this._lastRaw=t;
      if(this.acc<1000/cap-1) return;
      this.acc=0;
    } else this._lastRaw=t;
    let dt=Math.min((t-this.last)/1000,.05);
    this.last=t;
    if(this.state==='playing'&&P) Game.update(dt);
    const g=Renderer.frame(t,dt);
    if(P&&(this.state==='playing'||this.state==='paused'||this.state==='levelup'||this.state==='over'))
      Game.render(g,dt);
    else
      Draw.background(g,dt*.4); // menu backdrop — slow-scrolling empty bridge
  },
  init(){
    Renderer.init(); Settings.init(); Sprites.init(); Input.init(); UI.init(); UI.refreshMenu();
    this.last=performance.now();
    requestAnimationFrame(ts=>this.loop(ts));
  }
};

Engine.init();
</script>
